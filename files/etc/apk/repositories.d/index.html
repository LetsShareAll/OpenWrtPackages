  <style>
    .copy-btn {
      cursor: pointer;
      margin-left: 5px;
      display: inline-block;
      transition: all 0.2s ease;
    }
    .copy-btn:active {
      transform: scale(0.9);
      opacity: 0.7;
    }
    .copy-btn.success {
      color: #4CAF50;
      transform: scale(1.2);
      animation: pop 0.3s ease-in-out;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .search-input {
      width: 100%;
      padding: 5px 15px;
      margin-bottom: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      box-shadow: 0 0 0.5em #999;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .search-input:focus {
      border-color: #007bff;
      box-shadow: 0 0 0.5em rgba(0, 123, 255, 0.5);
    }
    /* README 区块样式 */
    .readme-wrapper {
      margin-top: 16px;
      padding: 12px !important;
      background: #f5f5f5;
      border-top: 1px solid #e1e4e8;
      box-shadow: 0 0 0.5em #999 !important;
    }
    .readme-wrapper h2 {
      margin-top: 0;
    }
    .markdown-body {
      box-sizing: border-box;
      margin: 0 auto;
      padding: 12px;
      border-radius: 4px;
      background-color: #fff;
    }
    .readme-content {
      background: #fafafa;
      padding: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .hljs {
      border-radius: 4px;
    }
    /* 代码块复制按钮样式 */
    .code-block-wrapper {
      position: relative;
    }
    .copy-code-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      z-index: 10;
      transition: background-color 0.2s;
    }
    .copy-code-btn:hover {
      background-color: #45a049;
    }
    .copy-code-btn.copied {
      background-color: #2196F3;
    }
  </style>
  <script>
    function copyToClipboard(sha, btnElement) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(sha)
          .then(() => {
            btnElement.textContent = '✅';
            btnElement.classList.add('success');
            setTimeout(() => {
              btnElement.textContent = '📋';
              btnElement.classList.remove('success');
            }, 1000);
          })
          .catch(() => showTooltip('复制失败', event));
      } else {
        prompt('请手动复制完整 SHA256：', sha);
      }
    }
    function showTooltip(text, e) {
      const tooltip = document.getElementById('tooltip');
      tooltip.textContent = text;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 10) + 'px';
      tooltip.style.top = (e.clientY + 10) + 'px';
      setTimeout(() => tooltip.style.display = 'none', 1000);
    }
  </script>

<h2>📖 自述</h2>

<script>
  (function() {
    const markdownText = "# CustomFeeds\n\n\u8bf7\u4f7f\u7528\u4ee5\u4e0b\u6587\u4ef6\u5939\u4e0b\u7684 Feeds\uff1a\n\n- [/immortalwrt/snapshots](/immortalwrt/snapshots)\n- [/immortalwrt/25.12.0](/immortalwrt/25.12.0)\n- [/openwrt/snapshots](/openwrt/snapshots)\n- [/openwrt/25.12.2](/openwrt/25.12.2)\n";
    const html = marked.parse(markdownText);
    document.getElementById('readme-content').innerHTML = html;
    if (typeof hljs !== 'undefined') {
      document.querySelectorAll('#readme-content pre code').forEach((block) => {
        hljs.highlightElement(block);
      });
    }
    // 为每个代码块添加复制按钮
    document.querySelectorAll('#readme-content pre').forEach((pre) => {
      if (pre.querySelector('.copy-code-btn')) return;
      const btn = document.createElement('button');
      btn.className = 'copy-code-btn';
      btn.textContent = '复制';
      btn.onclick = function(e) {
        e.stopPropagation();
        const code = pre.querySelector('code');
        const text = code ? code.innerText : '';
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = '已复制!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '复制';
            btn.classList.remove('copied');
          }, 2000);
        }).catch(() => {
          btn.textContent = '失败';
          setTimeout(() => { btn.textContent = '复制'; }, 2000);
        });
      };
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });
  })();
</script>
